appId: com.openmindlearn.app
productName: OpenMindLearn
asar: true
afterPack: ./scripts/assert-no-env.cjs

directories:
  output: release

files:
  - src/**/*
  - package.json
  - '!**/.env'
  - '!**/.env.*'

extraResources:
  - from: ../frontend/dist
    to: frontend/dist
    filter:
      - '**/*'
      - '!**/.env'
      - '!**/.env.*'
  - from: ../backend/dist
    to: backend/dist
    filter:
      - '**/*'
      - '!**/.env'
      - '!**/.env.*'
  - from: ../backend/package.json
    to: backend/package.json

mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
